<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Busqueda | La Cueva del Enano</title>
  <meta name="description" content="Resultados de busqueda de productos en La Cueva del Enano">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="img/icons/logoPrincipal.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Trade+Winds&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <a class="skip-link" href="#contenidoPrincipal">Saltar al contenido principal</a>
  <div>
    <header class="py-3">
      <div class="container-fluid header-grid">

        <div class="header-logo">
          <a href="index.html">
            <img src="img/icons/logoPrincipal.png" alt="Logo" class="img-fluid logo-grande">
          </a>
        </div>

        <div class="header-central">
          <div class="header-buscador">
            <div class="input-group">
              <input id="buscador" type="search" class="form-control" placeholder="¿Que estas buscando?" autocomplete="on">
              <button id="botonLupa" class="btn btn-secondary">
                <img id="lupa" src="img/icons/lupa.png" alt="Buscar">
              </button>
            </div>
          </div>

          <nav class="header-nav mt-3">
            <a href="index.html" class="text-decoration-none text-warning">INICIO</a>
            <a href="ofertas.html" class="text-decoration-none text-warning">OFERTAS</a>
            <a href="mas-vendidos.html" class="text-decoration-none text-warning">LO MAS VENDIDO</a>
            <a href="shop.html" class="text-decoration-none text-warning">PRODUCTOS</a>
            <a href="info.html" class="text-decoration-none text-warning">CONTACTO</a>
          </nav>
        </div>

        <div class="header-iconos">
          <a href="login.html"><img src="img/icons/inicioSesion.png" alt="Inicio sesion" class="icono-header"></a>
          <a href="#"><img src="img/icons/idioma.png" alt="Idioma" class="icono-header"></a>
          <a href="cart.html"><img src="img/icons/carrito.png" alt="Carrito" class="icono-header icono-carrito"></a>
          <button id="modoImagen"><img src="img/icons/apagado.png" alt="modo Oscuro" class="icono-header icono-apagado"></button>

          <button class="btn p-0 border-0 d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#menuMovil"
            aria-controls="menuMovil" aria-expanded="false" aria-label="Toggle navigation">
            <img src="img/icons/hamburguesa.png" alt="Menu" style="width:35px; height:35px;">
          </button>
        </div>

      </div>

      <div class="collapse mt-3 d-md-none" id="menuMovil">
        <div class="p-3 rounded bg-secondary">
          <nav class="d-flex flex-column gap-2 text-center">
            <a href="index.html" class="text-light text-decoration-none">INICIO</a>
            <a href="ofertas.html" class="text-light text-decoration-none">OFERTAS</a>
            <a href="mas-vendidos.html" class="text-light text-decoration-none">LO MAS VENDIDO</a>
            <a href="shop.html" class="text-light text-decoration-none">PRODUCTOS</a>
            <a href="info.html" class="text-light text-decoration-none">CONTACTO</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="contenidoPrincipal" tabindex="-1" class="busqueda-main container">
      <h1>Busqueda de productos</h1>
      <p>Consulta: <strong id="textoConsultaBusqueda"></strong></p>
      <h2 id="tituloResultadosBusqueda">Resultados encontrados: 0</h2>
      <section id="resultadosBusqueda" class="resultados-busqueda" aria-live="polite"></section>
    </main>

    <footer class="text-light py-4">
      <div class="container text-center">
        <p class="mb-0">© 2025 La Cueva del Enano — Todos los derechos reservados.</p>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="script.js" defer></script>
</body>

</html>
