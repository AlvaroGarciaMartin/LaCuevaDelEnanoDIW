   <style>
      /* ACTIVIDAD 3 (fase carga): oscilación visible de la pieza central del icono */
      #path3 {
         transform-box: fill-box;
         transform-origin: center;
         animation: usuarioCargaBalanceo 1.7s ease-in-out infinite;
      }

      /* ACTIVIDAD 3 (fase hover): al pasar el ratón por el SVG, se amplía el rostro */
      svg:hover #path2 {
         transform-box: fill-box;
         transform-origin: center;
         transform: scale(1.22);
         transition: transform 220ms ease-out;
      }

      /* Refuerzo visual adicional al hover */
      svg:hover #path1 {
         transform-box: fill-box;
         transform-origin: center;
         transform: translateY(-1.8px);
         transition: transform 220ms ease-out;
      }

      /* Halo para que el hover se perciba claramente */
      svg:hover #path3 {
         filter: drop-shadow(0 0 3px rgba(217, 178, 93, 0.9)) drop-shadow(0 0 7px rgba(217, 178, 93, 0.5));
         transition: filter 220ms ease-out;
      }

      @keyframes usuarioCargaBalanceo {
         0% {
            transform: translateY(0px) rotate(0deg);
         }

         30% {
            transform: translateY(-1.6px) rotate(-3.2deg);
         }

         65% {
            transform: translateY(1.2px) rotate(2.9deg);
         }

         100% {
            transform: translateY(0px) rotate(0deg);
         }
      }

      /* Accesibilidad: reduce animación si el usuario así lo configura */
      @media (prefers-reduced-motion: reduce) {
         #path3 {
            animation: none;
         }

         svg:hover #path2,
         svg:hover #path1,
         svg:hover #path3 {
            transition: none;
            transform: none;
            filter: none;
         }
      }
   </style>
