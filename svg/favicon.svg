   <style>
      /* ACTIVIDAD 3 - FASE 1: animación de carga (movimiento suave de una pieza del logo) */
      #path4 {
         /* El origen de transformación se calcula sobre la caja del propio path */
         transform-box: fill-box;
         /* Centro del elemento para un balanceo natural */
         transform-origin: center;
         /* Animación continua y breve para dar vida al logo sin distraer */
         animation: logoBalanceoCarga 2.2s ease-in-out infinite;
      }

      /* ACTIVIDAD 3 - FASE 2: al pasar el ratón por el logo, otro elemento se amplía */
      #layer1:hover #path7 {
         /* Escala del elemento circular al hover */
         transform: scale(1.22);
         /* Suaviza la transición de entrada y salida */
         transition: transform 280ms ease-out;
         /* Origen centrado para que crezca desde su centro */
         transform-box: fill-box;
         transform-origin: center;
      }

      /* Refuerzo visual extra al hover sobre el logo completo */
      #layer1:hover #rect2 {
         filter: brightness(1.14);
         transition: filter 280ms ease-out;
      }

      @keyframes logoBalanceoCarga {
         0% {
            transform: translateY(0px) rotate(0deg);
         }

         35% {
            transform: translateY(-0.8px) rotate(-2deg);
         }

         70% {
            transform: translateY(0.6px) rotate(1.5deg);
         }

         100% {
            transform: translateY(0px) rotate(0deg);
         }
      }

      /* Accesibilidad: reduce movimiento en el logo si el usuario lo prefiere */
      @media (prefers-reduced-motion: reduce) {
         #path4 {
            animation: none;
         }

         #layer1:hover #path7,
         #layer1:hover #rect2 {
            transition: none;
         }
      }
   </style>
